site_name: Unicode в глубину
site_description: Серия технических статей о стандарте Unicode — внутреннее устройство, кодировки, нормализация, коллация, инструменты
site_author: Petro
docs_dir: docs
site_dir: site

exclude_docs: |
  **/data/

extra_css:
  - assets/stylesheets/extra.css

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

extra_javascript:
  - assets/javascripts/header-link.js
  - assets/javascripts/run-js.js

plugins:
  - search:
      lang: ru
  - minify:
      minify_html: true

nav:
  - 1. Основы Unicode: 01-basics/article.md
  - 2. Unicode Character Database: 02-ucd-files/article.md
  - 3. Кодировки UTF-8/16/32: 03-encodings/article.md
  - 4. Графемные кластеры: 04-grapheme-clusters/article.md
  - 5. Нормализация: 05-normalization/article.md
  - 6. Коллация и сортировка: 06-collation/article.md
  - 7. Linux и инструменты: 07-linux-tools/article.md
  - Ресурсы: resources.md
